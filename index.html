<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z&M Stream | Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --red: #A90432;
      --red-bright: #ff0844;
      --gold: #FDB912;
      --gold-bright: #ffe066;
      --bg: #060608;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── ANIMATED BACKGROUND (Senin orijinal efektlerin) ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 10%, rgba(169,4,50,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 90%, rgba(253,185,18,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(169,4,50,0.06) 0%, transparent 70%);
      animation: bgPulse 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgPulse {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.05); }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(169,4,50,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(169,4,50,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LOGIN PAGE ── */
    #login-page {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: loginFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--gold) 0%, #fff 45%, var(--red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(169,4,50,0.5));
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(40px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .input-group { position: relative; margin-bottom: 1rem; }
    .input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.25); }

    .login-card input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 15px 16px 15px 44px;
      border-radius: 14px;
      color: white;
      outline: none;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--red) 0%, #c4053f 100%);
      color: white;
      border: none;
      padding: 17px;
      border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: 0.4s;
    }

    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(169,4,50,0.5); }

    #login-error { color: var(--red-bright); font-size: 0.85rem; margin-top: 12px; text-align: center; font-weight: 700; display: none; }

    /* ── MAIN APP ── */
    #main-app { display: none; flex-direction: column; flex: 1; position: relative; z-index: 10; }

    header {
      padding: 0.8rem 4%;
      background: rgba(6,6,8,0.92);
      backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(169,4,50,0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky; top: 0;
      z-index: 100;
    }

    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 3px; }
    .header-title span { color: var(--gold); }

    /* ── VIDEO SECTION ── */
    .video-section {
      width: 93%;
      max-width: 1000px;
      margin: 28px auto 10px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 16/9;
      background: #000;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    }

    #video-target { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    #error-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 99;
      display: none; flex-direction: column; justify-content: center; align-items: center;
    }

    /* ── CHANNELS GRID ── */
    .grid-channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      width: 93%;
      max-width: 1000px;
      margin: 20px auto;
      padding-bottom: 50px;
    }

    .channel-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 22px 10px;
      border-radius: 18px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
      position: relative;
    }

    .channel-card:hover, .channel-card.active {
      border-color: rgba(169,4,50,0.5);
      background: rgba(169,4,50,0.1);
      transform: translateY(-5px);
    }

    .channel-card.active { border-color: var(--gold); }

    .card-icon-wrap { width: 44px; height: 44px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    
    .status-bar { width: 93%; max-width: 1000px; margin: 14px auto; display: flex; align-items: center; gap: 10px; }
    .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); }
    .status-indicator.live { background: var(--red-bright); box-shadow: 0 0 10px var(--red); }
    #statusLabel { font-size: 0.8rem; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="login-page">
    <div class="login-wrap">
      <div class="login-brand">Z&M STREAM</div>
      <div class="login-card">
        <div class="input-group">
          <i data-lucide="user" size="16"></i>
          <input type="text" id="username" placeholder="Kullanıcı Adı">
        </div>
        <div class="input-group">
          <i data-lucide="lock" size="16"></i>
          <input type="password" id="password" placeholder="Şifre">
        </div>
        <button class="btn-login" onclick="attemptLogin()">Sisteme Giriş</button>
        <p id="login-error">⚠ Bilgiler hatalı!</p>
      </div>
    </div>
  </div>

  <div id="main-app">
    <header>
      <div class="header-title">Z&M <span>STREAM</span></div>
      <button class="btn-login" style="padding: 8px 15px; font-size: 0.8rem; width: auto;" onclick="location.reload()">Çıkış</button>
    </header>

    <div class="video-section">
      <div id="error-overlay">
        <i data-lucide="shield-alert" size="32" style="color:var(--red-bright); margin-bottom:10px;"></i>
        <h2>Kanal Kapalı</h2>
      </div>
      <div id="video-target"></div>
    </div>

    <div class="status-bar">
      <div class="status-indicator" id="statusDot"></div>
      <div id="statusLabel">Lütfen Kanal Seçin</div>
    </div>

    <div class="grid-channels" id="channelList"></div>
  </div>

  <script>
    lucide.createIcons();

    // Giriş bilgileri
    const AUTH = { u: "zm", p: "1905" };

    // Kanallar - Extra 1'e senin Ninja linkini gömdüm
    const CHANNELS = [
      { name: "Z&M Extra 1", icon: "award", url: "https://vdo.ninja/?view=AuJ7Zh4&autoplay&clean&videobitrate=10000" },
      { name: "Z&M Extra 2", icon: "award", url: "" },
      { name: "Z&M Extra 3", icon: "star", url: "" },
      { name: "Z&M Extra 4", icon: "activity", url: "" }
    ];

    function attemptLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if (u === AUTH.u && p === AUTH.p) {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        initChannels();
      } else {
        const err = document.getElementById('login-error');
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
      }
    }

    function initChannels() {
      const list = document.getElementById('channelList');
      list.innerHTML = '';
      CHANNELS.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
          <div class="card-icon-wrap"><i data-lucide="${ch.icon}"></i></div>
          <span>${ch.name}</span>
        `;
        card.onclick = () => play(ch, card);
        list.appendChild(card);
      });
      lucide.createIcons();
    }

    function play(ch, el) {
      const target = document.getElementById('video-target');
      const err = document.getElementById('error-overlay');
      const statusLabel = document.getElementById('statusLabel');
      const statusDot = document.getElementById('statusDot');

      document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');

      err.style.display = 'none';
      target.innerHTML = '';

      if (!ch.url) {
        err.style.display = 'flex';
        statusLabel.innerText = "YAYIN ÇEVRİMDIŞI";
        statusDot.className = 'status-indicator';
        return;
      }

      // Ninja linki iframe gerektirir
      const iframe = document.createElement('iframe');
      iframe.src = ch.url;
      iframe.allow = "autoplay; fullscreen";
      target.appendChild(iframe);

      statusLabel.innerText = "YAYINDA: " + ch.name;
      statusDot.className = 'status-indicator live';
    }
  </script>
</body>
</html>
