<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z&M Stream — Bakımda</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --red:#A90432; --red-bright:#ff0844; --gold:#FDB912; --bg:#060608; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:white;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden;padding:20px;}

    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(169,4,50,.22) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(253,185,18,.1) 0%,transparent 60%);animation:bgPulse 6s ease-in-out infinite alternate;pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(169,4,50,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(169,4,50,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}

    @keyframes bgPulse{from{opacity:.5;transform:scale(1)}to{opacity:1;transform:scale(1.04)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes brandGlow{from{filter:drop-shadow(0 0 20px rgba(169,4,50,.4))}to{filter:drop-shadow(0 0 60px rgba(253,185,18,.6))}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scanLine{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes countPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @keyframes wrenchSpin{0%{transform:rotate(0deg)}20%{transform:rotate(-20deg)}40%{transform:rotate(20deg)}60%{transform:rotate(-10deg)}80%{transform:rotate(10deg)}100%{transform:rotate(0deg)}}

    .wrap{position:relative;z-index:10;text-align:center;animation:fadeUp .8s cubic-bezier(.16,1,.3,1) forwards;display:flex;flex-direction:column;align-items:center;gap:1.8rem;max-width:520px;width:100%;}

    .brand{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:6px;background:linear-gradient(135deg,var(--gold) 0%,#fff 45%,var(--red) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:brandGlow 3s ease-in-out infinite alternate;}

    .card{background:rgba(10,10,15,.9);backdrop-filter:blur(40px);border-radius:28px;border:1px solid rgba(255,255,255,.08);padding:2.8rem 2.4rem;width:100%;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--gold),var(--red),transparent);background-size:200%;animation:scanLine 3s linear infinite;}
    .card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--red),transparent);}

    .wrench{font-size:3.5rem;display:block;margin-bottom:.5rem;animation:wrenchSpin 2.5s ease-in-out infinite;}

    .title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:var(--gold);margin-bottom:.6rem;}

    .msg{color:rgba(255,255,255,.55);font-size:1rem;font-weight:600;letter-spacing:.5px;line-height:1.6;margin-bottom:.4rem;}
    .msg b{color:rgba(255,255,255,.9);}

    .custom-msg{background:rgba(253,185,18,.06);border:1px solid rgba(253,185,18,.15);border-radius:14px;padding:14px 18px;color:rgba(255,255,255,.75);font-size:.95rem;font-weight:600;letter-spacing:.3px;line-height:1.6;display:none;text-align:left;margin-top:.4rem;}
    .custom-msg.visible{display:block;}
    .custom-msg-label{font-size:.65rem;font-weight:700;letter-spacing:3px;color:var(--gold);margin-bottom:6px;text-transform:uppercase;}

    .spinner-wrap{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:.5rem;}
    .spinner{width:40px;height:40px;position:relative;}
    .spinner::before{content:'';position:absolute;inset:0;border:3px solid transparent;border-top-color:var(--gold);border-bottom-color:var(--red);border-radius:50%;animation:spin .9s linear infinite;}
    .spinner::after{content:'';position:absolute;inset:7px;border:2px solid transparent;border-left-color:rgba(253,185,18,.35);border-radius:50%;animation:spin 1.5s linear infinite reverse;}
    .spinner-text{font-size:.75rem;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.25);animation:pulse 2s ease-in-out infinite;}

    .progress-bar{width:100%;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:.2rem;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;animation:progressAnim 3s ease-in-out infinite alternate;}
    @keyframes progressAnim{from{width:15%;margin-left:0}to{width:60%;margin-left:20%}}

    /* Admin kısmı — sadece query param ile görünür */
    .admin-edit{display:none;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;width:100%;}
    .admin-edit.visible{display:block;}
    .admin-edit-title{font-size:.7rem;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.25);margin-bottom:12px;text-transform:uppercase;}
    .ae-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);padding:10px 14px;border-radius:10px;color:white;outline:none;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;margin-bottom:8px;transition:all .3s;}
    .ae-input:focus{border-color:rgba(253,185,18,.4);}
    .ae-btn{width:100%;background:linear-gradient(135deg,var(--red),#c4053f);border:none;color:white;padding:11px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer;transition:all .3s;}
    .ae-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(169,4,50,.4);}
    .ae-clear{margin-top:6px;width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);padding:9px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;letter-spacing:1px;}
    .ae-clear:hover{color:white;}
  </style>
</head>
<body>

<div class="wrap">
  <div class="brand">Z&amp;M STREAM</div>

  <div class="card">
    <span class="wrench">🔧</span>
    <div class="title">SİSTEM BAKIMDA</div>
    <div class="msg">Z&amp;M Stream şu an <b>bakım çalışması</b> nedeniyle geçici olarak kullanım dışıdır.<br>En kısa sürede geri döneceğiz!</div>

    <div class="custom-msg" id="custom-msg-box">
      <div class="custom-msg-label">📢 Yönetici Mesajı</div>
      <div id="custom-msg-text"></div>
    </div>

    <div class="spinner-wrap" style="margin-top:1.4rem;">
      <div class="spinner"></div>
      <div class="spinner-text">ÇALIŞMALAR DEVAM EDİYOR</div>
    </div>
    <div class="progress-bar" style="margin-top:1rem;"><div class="progress-fill"></div></div>
  </div>

  <!-- Admin mesaj editörü — ?admin=1 ile görünür -->
  <div class="admin-edit" id="admin-edit">
    <div class="admin-edit-title">⚙ Mesaj Düzenle</div>
    <textarea class="ae-input" id="ae-msg" rows="3" placeholder="Kullanıcılara gösterilecek mesaj..."></textarea>
    <button class="ae-btn" onclick="saveMsg()">💾 Mesajı Yayınla</button>
    <button class="ae-clear" onclick="clearMsg()">Mesajı Kaldır</button>
  </div>
</div>

<script>
  // localStorage'dan mesaj yükle
  function loadMsg() {
    const msg = localStorage.getItem('zm_bakim_msg');
    if (msg) {
      document.getElementById('custom-msg-text').textContent = msg;
      document.getElementById('custom-msg-box').classList.add('visible');
      const ta = document.getElementById('ae-msg');
      if (ta) ta.value = msg;
    }
  }

  function saveMsg() {
    const val = document.getElementById('ae-msg').value.trim();
    if (!val) return;
    localStorage.setItem('zm_bakim_msg', val);
    document.getElementById('custom-msg-text').textContent = val;
    document.getElementById('custom-msg-box').classList.add('visible');
  }

  function clearMsg() {
    localStorage.removeItem('zm_bakim_msg');
    document.getElementById('ae-msg').value = '';
    document.getElementById('custom-msg-box').classList.remove('visible');
  }

  // ?admin=1 URL parametresiyle admin editörü aç
  if (new URLSearchParams(window.location.search).get('admin') === '1') {
    document.getElementById('admin-edit').classList.add('visible');
  }

  loadMsg();
</script>
</body>
</html>
